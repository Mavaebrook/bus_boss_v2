name: map_engine
description: map_engine silo for the LYNX Bus Routing system. renders routes and live bus positions.
version: 1.0.0
publish_to: none

environment:
  # Logic Correction: Lifted to match the root app's Native Assets requirement 
  # for the sqlite3 v3 branch you are using.
  sdk: ">=3.9.999 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Internal Silos
  contracts:
    path: ../contracts
  transit_realtime:
    path: ../transit_realtime
    
  # State & Logic
  riverpod: ^2.5.1
  rxdart: ^0.27.7
  equatable: ^2.0.5
  
  # Mapping Stack
  # Logic Correction: Upgraded to v7.0.0 to satisfy flutter_map_tile_caching v9.1.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.0
  flutter_map_tile_caching: ^9.1.0 
  
  # For smooth bus movement animations on the map
  flutter_animarker: ^3.0.0 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
