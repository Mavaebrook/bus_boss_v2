name: transit_etl
description: transit_etl silo for the LYNX Bus Routing system.
version: 1.0.0
publish_to: none

environment:
  # Native Assets support requires Dart 3.2+
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  contracts:
    path: ../contracts
  riverpod: ^2.5.1
  rxdart: ^0.27.7
  equatable: ^2.0.5
  # Upgrade drift to support the Native Assets architecture
  drift: ^2.32.1
  # Upgrade sqlite3 to use pre-compiled native binaries
  sqlite3: ^3.3.1
  # DELETE sqlite3_flutter_libs - it is the source of the Gradle/NDK clusterfuck
  path_provider: ^2.1.0
  archive: ^3.6.1

dev_dependencies:
  flutter_lints: ^3.0.0
  # Keep drift_dev in sync with the drift version
  drift_dev: ^2.32.1
  build_runner: ^2.4.8
  
