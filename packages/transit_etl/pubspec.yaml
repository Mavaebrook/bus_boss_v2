name: transit_etl
description: transit_etl silo for the LYNX Bus Routing system.
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  contracts:
    path: ../contracts
  riverpod: ^2.5.1
  rxdart: ^0.27.7
  equatable: ^2.0.5
  drift: ^2.15.0
  sqlite3: ^2.4.0
  path_provider: ^2.1.0
  archive: ^3.6.1   # for reading GTFS zip files

dev_dependencies:
  flutter_lints: ^3.0.0
  drift_dev: ^2.15.0
  build_runner: ^2.4.8
