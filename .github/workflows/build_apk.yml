Name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest GTFS database artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: gtfs_etl.yml
          workflow_conclusion: success
          name: lynx-gtfs-db
          path: assets/gtfs/
          check_artifacts: true
        continue-on-error: true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Logic Correction: Use 'beta' channel to access the 3.44/3.9.999 SDK 
          # required for your sqlite3 v3 native assets implementation.
          channel: 'beta'

      - name: Get dependencies
        run: |
          # Clean build artifacts to prevent stale cache interference
          flutter clean
          rm -f pubspec.lock
          flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bus-boss-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
          
