name: LYNX GTFS ETL

on:
  schedule:
    # Every Monday at 06:00 UTC (typical LYNX feed update day)
    - cron: '0 6 * * 1'
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download GTFS feed
        run: |
          mkdir -p data
          curl -L -o data/gtfs.zip "http://gtfsrt.golynx.com/gtfsrt/google_transit.zip"
      - name: Run ETL pipeline
        run: python scripts/gemini_gtfs.py data/gtfs.zip data/gtfs.db

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: lynx-gtfs-db
          path: data/gtfs.db
          retention-days: 30
